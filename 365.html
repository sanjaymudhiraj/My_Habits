<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>365 Day Work Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

.container{
display:flex;
height:100vh;
}

/* LEFT PANEL */

.left{
width:22%;
background:white;
padding:20px;
border-right:1px solid #ddd;
overflow-y:auto;
}

.left input{
padding:6px;
width:65%;
}

.left button{
padding:6px;
cursor:pointer;
}

/* PRIORITY LIST */

.messageContainer{
margin-top:15px;
border:1px solid #ccc;
background:#fafafa;
padding:10px;
border-radius:6px;
max-height:350px;
overflow-y:auto;
}

.messageItem{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px;
border-bottom:1px solid #ddd;
background:white;
margin-bottom:5px;
cursor:move;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:4px 8px;
border-radius:4px;
cursor:pointer;
}

/* CENTER CALENDAR */

.center{
width:48%;
overflow-y:auto;
padding:20px;
}

.month{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.days{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.dayBox{
background:#fafafa;
border:1px solid #ddd;
border-radius:6px;
text-align:center;
padding:6px;
font-size:12px;
}

.dayBox input{
margin-top:4px;
cursor:pointer;
}

/* RIGHT PANEL */

.right{
width:30%;
background:white;
padding:20px;
border-left:1px solid #ddd;
display:flex;
flex-direction:column;
gap:40px;
}

.chartBox{
height:260px;
}

/* FOOTER */

footer{
background:#222;
color:white;
text-align:center;
padding:10px;
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT PANEL -->

<div class="left">

<h2>Priority List</h2>

<input id="msgInput" placeholder="Add item">
<button onclick="addMessage()">Add</button>

<div class="messageContainer" id="msgList"></div>

</div>

<!-- CENTER CALENDAR -->

<div class="center" id="calendar"></div>

<!-- RIGHT GRAPHS -->

<div class="right">

<div class="chartBox">
<h3>Monthly Work Days</h3>
<canvas id="monthChart"></canvas>
</div>

<div class="chartBox">
<h3>Year Activity Chart</h3>
<canvas id="yearChart"></canvas>
</div>

</div>

</div>

<footer>
Contact Support 📧 sanjaymudhiraj08@gmail.com
</footer>

<script>

/* ENTER KEY SUPPORT */

document.getElementById("msgInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){

e.preventDefault()
addMessage()

}

})

/* PRIORITY LIST */

let draggedItem=null

function addMessage(){

let input=document.getElementById("msgInput")
let text=input.value.trim()

if(text==="") return

let div=document.createElement("div")

div.className="messageItem"
div.draggable=true

div.innerHTML=`
<span>${text}</span>
<button class="deleteBtn">X</button>
`

/* DELETE BUTTON */

div.querySelector("button").onclick=function(){
div.remove()
}

/* DRAG EVENTS */

div.addEventListener("dragstart",function(){
draggedItem=div
})

div.addEventListener("dragover",function(e){
e.preventDefault()
})

div.addEventListener("drop",function(){

if(draggedItem!==div){

let container=document.getElementById("msgList")
container.insertBefore(draggedItem,div)

}

})

document.getElementById("msgList").appendChild(div)

input.value=""

}

/* CALENDAR GENERATION */

let startDate=new Date("March 1, 2026")
let totalDays=365

const monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]
const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]

let calendar=document.getElementById("calendar")

let monthlyCounts=new Array(12).fill(0)
let tradingPoints=[]

let months={}

for(let i=0;i<totalDays;i++){

let date=new Date(startDate)
date.setDate(startDate.getDate()+i)

let monthKey=monthNames[date.getMonth()]+" "+date.getFullYear()

if(!months[monthKey]) months[monthKey]=[]

months[monthKey].push(date)

}

/* BUILD MONTHS */

for(let month in months){

let div=document.createElement("div")
div.className="month"

let daysHTML=""

months[month].forEach(date=>{

let day=date.getDate()
let dayName=dayNames[date.getDay()]
let monthIndex=date.getMonth()

daysHTML+=`
<div class="dayBox">
${dayName}<br>
${monthNames[monthIndex]} ${day}
<br>
<input type="checkbox"
data-month="${monthIndex}"
data-day="${day}"
onchange="updateCharts(this)">
</div>
`

})

div.innerHTML=`<h3>${month}</h3><div class="days">${daysHTML}</div>`

calendar.appendChild(div)

}

/* GRAPHS */

const monthChart=new Chart(document.getElementById("monthChart"),{

type:"bar",

data:{
labels:monthNames,
datasets:[{
label:"Days Worked",
data:monthlyCounts
}]
}

})

const yearChart=new Chart(document.getElementById("yearChart"),{

type:"line",

data:{
datasets:[{
label:"Work Points",
data:[],
showLine:true,
tension:0.3
}]
},

options:{
scales:{
x:{
type:"linear",
title:{display:true,text:"Month"}
},
y:{
min:1,
max:31,
title:{display:true,text:"Day"}
}
}
}

})

/* UPDATE CHARTS */

function updateCharts(box){

let month=parseInt(box.dataset.month)
let day=parseInt(box.dataset.day)

if(box.checked){

monthlyCounts[month]++
tradingPoints.push({x:month+1,y:day})

}else{

monthlyCounts[month]--
tradingPoints=tradingPoints.filter(p=>!(p.x==month+1 && p.y==day))

}

monthChart.data.datasets[0].data=monthlyCounts
monthChart.update()

yearChart.data.datasets[0].data=tradingPoints
yearChart.update()

}

</script>

</body>
</html>
