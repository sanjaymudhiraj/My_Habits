<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>365 Day Work Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

.container{
display:flex;
height:100vh;
}

/* LEFT PANEL */

.left{
width:22%;
background:white;
padding:20px;
border-right:1px solid #ddd;
overflow-y:auto;
}

.left input{
padding:6px;
width:65%;
}

.left button{
padding:6px;
cursor:pointer;
}

.messageContainer{
margin-top:15px;
border:1px solid #ccc;
background:#fafafa;
padding:10px;
border-radius:6px;
max-height:350px;
overflow-y:auto;
}

.messageItem{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px;
border-bottom:1px solid #ddd;
background:white;
margin-bottom:5px;
cursor:move;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:4px 8px;
border-radius:4px;
cursor:pointer;
}

/* CENTER */

.center{
width:48%;
overflow-y:auto;
padding:20px;
}

.month{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.days{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.dayBox{
background:#fafafa;
border:1px solid #ddd;
border-radius:6px;
text-align:center;
padding:6px;
font-size:12px;
}

/* RIGHT */

.right{
width:30%;
background:white;
padding:20px;
border-left:1px solid #ddd;
display:flex;
flex-direction:column;
gap:30px;
}

.chartBox{
height:260px;
}

.streak{
background:#fff3cd;
padding:10px;
border-radius:6px;
font-weight:bold;
}

.percent{
font-size:13px;
color:#555;
}

footer{
background:#222;
color:white;
text-align:center;
padding:10px;
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT PANEL -->

<div class="left">

<h2>Priority List</h2>

<input id="msgInput" placeholder="Add item">
<button onclick="addMessage()">Add</button>

<div class="messageContainer" id="msgList"></div>

<br>

<button onclick="exportData()">Export Progress</button>

</div>

<!-- CENTER -->

<div class="center" id="calendar"></div>

<!-- RIGHT -->

<div class="right">

<div class="streak">
🔥 Current Streak: <span id="streak">0</span> days
</div>

<div class="chartBox">
<h3>Monthly Work Days</h3>
<canvas id="monthChart"></canvas>
</div>

<div class="chartBox">
<h3>Year Activity Chart</h3>
<canvas id="yearChart"></canvas>
</div>

</div>

</div>

<footer>
Contact Support 📧 sanjaymudhiraj08@gmail.com
</footer>

<script>

/* ENTER KEY */

document.getElementById("msgInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){

e.preventDefault()
addMessage()

}

})

/* TASK STORAGE */

let draggedItem=null

function createTaskElement(text){

let div=document.createElement("div")

div.className="messageItem"
div.draggable=true

div.innerHTML=`
<span>${text}</span>
<button class="deleteBtn">X</button>
`

div.querySelector("button").onclick=function(){

div.remove()
saveTasks()

}

div.addEventListener("dragstart",function(){
draggedItem=div
})

div.addEventListener("dragover",function(e){
e.preventDefault()
})

div.addEventListener("drop",function(){

if(draggedItem!==div){

let container=document.getElementById("msgList")
container.insertBefore(draggedItem,div)
saveTasks()

}

})

return div

}

function addMessage(){

let input=document.getElementById("msgInput")
let text=input.value.trim()

if(text==="") return

let div=createTaskElement(text)

document.getElementById("msgList").appendChild(div)

saveTasks()

input.value=""

}

function saveTasks(){

let tasks=[]

document.querySelectorAll(".messageItem span").forEach(item=>{
tasks.push(item.innerText)
})

localStorage.setItem("tasks",JSON.stringify(tasks))

}

function loadTasks(){

let tasks=JSON.parse(localStorage.getItem("tasks")) || []

tasks.forEach(task=>{
let div=createTaskElement(task)
document.getElementById("msgList").appendChild(div)
})

}

loadTasks()

/* CALENDAR */

let startDate=new Date("March 1, 2026")
let totalDays=365

const monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]
const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]

let calendar=document.getElementById("calendar")

let monthlyCounts=new Array(12).fill(0)
let tradingPoints=[]

let months={}

for(let i=0;i<totalDays;i++){

let date=new Date(startDate)
date.setDate(startDate.getDate()+i)

let key=monthNames[date.getMonth()]+" "+date.getFullYear()

if(!months[key]) months[key]=[]

months[key].push(date)

}

/* BUILD CALENDAR */

for(let month in months){

let div=document.createElement("div")
div.className="month"

let daysHTML=""

months[month].forEach(date=>{

let day=date.getDate()
let dayName=dayNames[date.getDay()]
let monthIndex=date.getMonth()

daysHTML+=`
<div class="dayBox">

${dayName}<br>
${monthNames[monthIndex]} ${day}

<br>

<input type="checkbox"
data-month="${monthIndex}"
data-day="${day}"
onchange="updateCharts(this)">

</div>
`

})

div.innerHTML=`<h3>${month}</h3><div class="days">${daysHTML}</div><div class="percent" id="percent-${month}"></div>`

calendar.appendChild(div)

}

/* CHARTS */

const monthChart=new Chart(document.getElementById("monthChart"),{

type:"bar",

data:{
labels:monthNames,
datasets:[{
label:"Days Worked",
data:monthlyCounts
}]
}

})

const yearChart=new Chart(document.getElementById("yearChart"),{

type:"line",

data:{
datasets:[{
label:"Work Points",
data:tradingPoints,
showLine:true,
tension:0.3
}]
},

options:{
scales:{
x:{type:"linear",title:{display:true,text:"Month"}},
y:{min:1,max:31,title:{display:true,text:"Day"}}
}
}

})

/* CHECK STORAGE */

function updateCharts(box){

let checkedDays=JSON.parse(localStorage.getItem("checkedDays")) || []

let key=box.dataset.month+"-"+box.dataset.day

if(box.checked){

checkedDays.push(key)

monthlyCounts[box.dataset.month]++

tradingPoints.push({
x:parseInt(box.dataset.month)+1,
y:parseInt(box.dataset.day)
})

}else{

checkedDays=checkedDays.filter(d=>d!==key)

monthlyCounts[box.dataset.month]--

tradingPoints=tradingPoints.filter(p=>!(p.x==box.dataset.month+1 && p.y==box.dataset.day))

}

localStorage.setItem("checkedDays",JSON.stringify(checkedDays))

monthChart.data.datasets[0].data=monthlyCounts
monthChart.update()

yearChart.data.datasets[0].data=tradingPoints
yearChart.update()

updateStreak()

}

/* RESTORE DATA */

function restoreChecks(){

let checkedDays=JSON.parse(localStorage.getItem("checkedDays")) || []

document.querySelectorAll("input[type='checkbox']").forEach(box=>{

let key=box.dataset.month+"-"+box.dataset.day

if(checkedDays.includes(key)){

box.checked=true

monthlyCounts[box.dataset.month]++

tradingPoints.push({
x:parseInt(box.dataset.month)+1,
y:parseInt(box.dataset.day)
})

}

})

monthChart.data.datasets[0].data=monthlyCounts
monthChart.update()

yearChart.data.datasets[0].data=tradingPoints
yearChart.update()

updateStreak()

}

restoreChecks()

/* STREAK */

function updateStreak(){

let checkedDays=JSON.parse(localStorage.getItem("checkedDays")) || []

let streak=checkedDays.length

document.getElementById("streak").innerText=streak

}

/* EXPORT DATA */

function exportData(){

let checkedDays=JSON.parse(localStorage.getItem("checkedDays")) || []

let csv="Date\n"

checkedDays.forEach(d=>{
csv+=d+"\n"
})

let blob=new Blob([csv],{type:"text/csv"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="progress.csv"

a.click()

}

</script>

</body>
</html>
